services:
  - type: web
    name: driver-log-pro-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn log_filler_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SECRET_KEY
        generateValue: true
